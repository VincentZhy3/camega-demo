<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | Camega Health</title>
  <meta name="description" content="Explore Camega's premium health supplements — Omega-3, BrainEye Pro, Men's Multinutrient and more.">
  <meta property="og:title" content="Our Products | Camega Health">
  <meta property="og:description" content="Premium NPN-certified health supplements from Camega.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://camega.ca/products.html">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
  <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  <script src="js/header-template.js"></script>
  <script src="js/footer-template.js"></script>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="products-container">
    <div class="products-header">
      <h1>Our Premium Supplements</h1>
      <p>Discover our carefully curated selection of high-quality health supplements</p>
    </div>

    <div class="filters-section">
      <div class="filters-row">
        <div class="search-box">
          <div class="filter-group">
            <label>Search Products</label>
            <input type="text" id="search-input" placeholder="Search by name, category, or benefits...">
          </div>
        </div>
        <div class="filter-group">
          <label>Category</label>
          <select id="category-filter">
            <option value="">All Categories</option>
            <option value="heart-health">Heart Health</option>
            <option value="brain-health">Brain Health</option>
            <option value="mens-health">Men's Health</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Price Range</label>
          <select id="price-filter">
            <option value="">All Prices</option>
            <option value="0-25">Under $25</option>
            <option value="25-50">$25 - $50</option>
            <option value="50-100">$50 - $100</option>
            <option value="100+">Over $100</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Sort By</label>
          <select id="sort-filter">
            <option value="name">Name A-Z</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="popularity">Most Popular</option>
            <option value="newest">Newest First</option>
          </select>
        </div>
      </div>
    </div>

    <div id="products-grid" class="products-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/products.js"></script>
</body>
</html>
